<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements - CCS Admin</title>
  <link rel="stylesheet" href="admin-styles.css">
  <style>
    .announcement-management {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      margin-top: 20px;
    }

    .announcement-form-section {
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 2px solid #e9ecef;
    }

    .announcement-form-section h3 {
      font-size: 1.1rem;
      color: #380402;
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: Arial, sans-serif;
      resize: vertical;
      min-height: 100px;
      outline: none;
    }

    .form-group textarea:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.15);
    }

    .btn-post {
      background: #198754;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-post:hover {
      background: #157347;
    }

    .announcements-list-section h3 {
      font-size: 1.1rem;
      color: #380402;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .announcement-count {
      font-size: 0.85rem;
      color: #666;
      font-weight: normal;
    }

    .announcement-card {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 4px solid #0d6efd;
      transition: box-shadow 0.2s;
    }

    .announcement-card:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .announcement-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .announcement-author {
      font-weight: 600;
      color: #380402;
      font-size: 0.95rem;
    }

    .announcement-date {
      font-size: 0.8rem;
      color: #666;
    }

    .announcement-body {
      font-size: 0.9rem;
      color: #333;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .announcement-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn-delete-announcement {
      background: #dc3545;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-delete-announcement:hover {
      background: #b02a37;
    }

    .no-announcements {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      font-size: 0.9rem;
      background: #f8f9fa;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="admin-nav">
    <div class="nav-left">
      <img src="images/uclogo.png" alt="UC Logo" class="nav-logo">
      <span class="nav-brand">College of Computer Studies Admin</span>
    </div>
    <div class="nav-links">
      <a href="admin.html">Home</a>
      <a href="search-student.html">Search</a>
      <a href="student-list.html">Students</a>
      <a href="sit-in-form.html">Sit-in</a>
      <a href="sit-in-records.html">Sit-in Records</a>
      <a href="sit-in-reports.html">Sit-in Reports</a>
      <a href="feedback-reports.html">Feedback Reports</a>
      <a href="reservation.html">Reservation</a>
      <a href="announcements.html" class="active">Announcements</a>
      <a href="#" onclick="adminLogout(); return false;" class="logout-btn">Log out</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="admin-container">

    <div class="page-header">
      <h1>📢 Announcement Management</h1>
      <p>Create and manage announcements for students</p>
    </div>

    <div class="announcement-management">
      
      <!-- Post New Announcement -->
      <div class="announcement-form-section">
        <h3>Post New Announcement</h3>
        <div class="form-group">
          <label for="announcementText">Announcement Content</label>
          <textarea id="announcementText" placeholder="Write your announcement here..."></textarea>
        </div>
        <button class="btn-post" onclick="postNewAnnouncement()">Post Announcement</button>
      </div>

      <!-- Announcements List -->
      <div class="announcements-list-section">
        <h3>
          All Announcements
          <span class="announcement-count" id="announcementCount">(0)</span>
        </h3>
        <div id="announcementsList">
          <!-- Announcements will be loaded here -->
        </div>
      </div>

    </div>

  </div>

  <script src="admin-script.js"></script>
  <script>
    function postNewAnnouncement() {
      const textarea = document.getElementById('announcementText');
      if (!textarea) return;

      try {
        const text = textarea.value.trim();
        if (!text) {
          alert('Please enter an announcement text.');
          return;
        }

        const result = AdminDB.addAnnouncement(text);
        if (result.success) {
          textarea.value = '';
          loadAllAnnouncements();
          alert('Announcement posted successfully!');
        }
      } catch (e) {
        console.error('Post announcement error:', e);
        alert('Error posting announcement.');
      }
    }

    function loadAllAnnouncements() {
      const container = document.getElementById('announcementsList');
      const countEl = document.getElementById('announcementCount');
      if (!container) return;

      try {
        const announcements = AdminDB.getAllAnnouncements();

        countEl.textContent = `(${announcements.length})`;

        if (announcements.length === 0) {
          container.innerHTML = '<div class="no-announcements">No announcements posted yet</div>';
          return;
        }

        // Sort by date (newest first)
        announcements.sort((a, b) => new Date(b.date) - new Date(a.date));

        container.innerHTML = announcements.map(ann => {
          const date = new Date(ann.date).toLocaleString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
          return `
            <div class="announcement-card">
              <div class="announcement-card-header">
                <div>
                  <div class="announcement-author">${ann.author}</div>
                  <div class="announcement-date">${date}</div>
                </div>
              </div>
              <div class="announcement-body">${ann.text}</div>
              <div class="announcement-actions">
                <button class="btn-delete-announcement" onclick="deleteAnnouncement('${ann.id}')">Delete</button>
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        console.error('Load announcements error:', e);
        container.innerHTML = '<div class="no-announcements">Error loading announcements</div>';
      }
    }

    function deleteAnnouncement(id) {
      if (!confirm('Are you sure you want to delete this announcement?')) {
        return;
      }

      const result = AdminDB.deleteAnnouncement(id);
      if (result.success) {
        loadAllAnnouncements();
        alert('Announcement deleted successfully!');
      }
    }

    // Load announcements on page load
    document.addEventListener('DOMContentLoaded', function() {
      loadAllAnnouncements();
    });
  </script>
</body>
</html>
