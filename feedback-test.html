<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #0d6efd; color: white; border: none; border-radius: 6px; }
    button:hover { background: #0b5ed7; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; }
    .modal-content { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 12px; z-index: 10000; min-width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .star { font-size: 3rem; cursor: pointer; color: #ddd; display: inline-block; padding: 0 8px; user-select: none; }
    .star.gold { color: #ffc107; }
    #ratingDisplay { text-align: center; margin-top: 15px; font-size: 1.1rem; color: #ffc107; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Feedback Test Page</h1>
  <button id="openBtn">Open Feedback</button>
  <div id="display"></div>

  <div id="feedbackModal">
    <div class="modal"></div>
    <div class="modal-content">
      <h2 style="margin: 0 0 20px 0;">Rate Us</h2>
      <div id="starContainer"></div>
      <div id="ratingDisplay"></div>
      <button id="closeBtn" style="margin-top: 20px; background: #6c757d; width: 100%;">Close</button>
    </div>
  </div>

  <script>
    var modal = document.getElementById('feedbackModal');
    var openBtn = document.getElementById('openBtn');
    var closeBtn = document.getElementById('closeBtn');
    var starContainer = document.getElementById('starContainer');
    var ratingDisplay = document.getElementById('ratingDisplay');
    var display = document.getElementById('display');

    // Create stars
    for (var i = 1; i <= 5; i++) {
      var span = document.createElement('span');
      span.className = 'star';
      span.textContent = '\u2605';
      span.setAttribute('data-value', i);
      starContainer.appendChild(span);
    }

    // Open modal
    openBtn.addEventListener('click', function() {
      modal.style.display = 'block';
      display.textContent = 'Modal opened!';
    });

    // Close modal
    closeBtn.addEventListener('click', function() {
      modal.style.display = 'none';
      display.textContent = 'Modal closed!';
    });

    // Star click event delegation
    starContainer.addEventListener('click', function(e) {
      if (e.target.classList.contains('star')) {
        var value = parseInt(e.target.getAttribute('data-value'));
        
        // Color stars
        var stars = starContainer.querySelectorAll('.star');
        for (var j = 0; j < stars.length; j++) {
          var starVal = parseInt(stars[j].getAttribute('data-value'));
          if (starVal <= value) {
            stars[j].classList.add('gold');
          } else {
            stars[j].classList.remove('gold');
          }
        }
        
        // Show rating
        var texts = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent!'];
        ratingDisplay.textContent = texts[value] + ' (' + value + '/5)';
        display.textContent = 'Star ' + value + ' selected!';
      }
    });
  </script>
</body>
</html>
