<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Feedback - CCS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .feedback-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .feedback-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #380402;
    }
    .star-rating {
      display: flex;
      flex-direction: row-reverse;
      justify-content: center;
      gap: 5px;
      margin: 20px 0;
    }
    .star-rating input {
      display: none;
    }
    .star-rating label {
      font-size: 2rem;
      color: #ddd;
      cursor: pointer;
      transition: color 0.2s;
    }
    .star-rating label:hover,
    .star-rating label:hover ~ label,
    .star-rating input:checked ~ label {
      color: #ffc107;
    }
    .form-message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .form-message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .form-message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <img src="images/uclogo.png" alt="UC Logo" class="nav-logo">
      <div class="nav-brand">College of Computer Studies Sit-in Monitoring System</div>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="community.html">Community ▾</a>
      <a href="about.html">About</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </div>
  </nav>

  <div class="auth-bg">
    <div class="feedback-container">
      <a class="back-btn" href="index.html">Back</a>
      <img src="images/ucmainccslogo.png" alt="UC Logo" class="auth-logo" style="display: block; margin: 0 auto 18px;">
      <h2>Submit Feedback</h2>
      <p style="text-align: center; color: #666; margin-bottom: 20px;">Help us improve our services!</p>
      
      <form id="feedbackForm">
        <div class="form-group">
          <label>Student ID Number</label>
          <input type="text" id="feedbackStudentId" required>
        </div>
        
        <div class="form-group">
          <label>Your Rating</label>
          <div class="star-rating">
            <input type="radio" id="star5" name="rating" value="5" required>
            <label for="star5">★</label>
            <input type="radio" id="star4" name="rating" value="4">
            <label for="star4">★</label>
            <input type="radio" id="star3" name="rating" value="3">
            <label for="star3">★</label>
            <input type="radio" id="star2" name="rating" value="2">
            <label for="star2">★</label>
            <input type="radio" id="star1" name="rating" value="1">
            <label for="star1">★</label>
          </div>
        </div>

        <div class="form-group">
          <label>Feedback / Comments</label>
          <textarea id="feedbackText" placeholder="Share your experience with us..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; font-family: Arial, sans-serif; min-height: 120px; resize: vertical;"></textarea>
        </div>

        <button class="btn-submit" type="submit" style="width: 100%;">Submit Feedback</button>
      </form>
      
      <div id="feedback_message" class="form-message"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="admin-script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('feedbackForm');
      const messageDiv = document.getElementById('feedback_message');

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        const studentId = document.getElementById('feedbackStudentId').value.trim();
        const ratingInput = document.querySelector('input[name="rating"]:checked');
        const feedbackText = document.getElementById('feedbackText').value.trim();

        if (!studentId) {
          showMessage('Please enter your student ID.', 'error');
          return;
        }

        if (!ratingInput) {
          showMessage('Please select a rating.', 'error');
          return;
        }

        const user = AdminDB.getUserById(studentId);
        
        const feedbackData = {
          student_id: studentId,
          student_name: user ? `${user.first_name} ${user.last_name}` : 'Unknown',
          rating: parseInt(ratingInput.value),
          feedback: feedbackText
        };

        const result = AdminDB.addFeedback(feedbackData);

        if (result.success) {
          showMessage('Thank you for your feedback!', 'success');
          form.reset();
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        } else {
          showMessage('Error submitting feedback. Please try again.', 'error');
        }
      });

      function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = 'form-message ' + type;
        messageDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
