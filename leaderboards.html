<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboards - CCS Admin</title>
  <link rel="stylesheet" href="admin-styles.css">
</head>
<body class="leaderboard-page">

  <div class="admin-container">

    <div class="table-container leaderboard-table-section">
      <div class="table-header">
        <h2>Leaderboard Rankings</h2>
      </div>
      <div class="announcement-content">
        <div class="leaderboard-note">
          Ranking order uses total sessions first, then total sit-in hours.
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Student ID</th>
              <th>Student Name</th>
              <th>Course</th>
              <th>Total Sessions</th>
              <th>Total Sit-in Hours</th>
            </tr>
          </thead>
          <tbody id="leaderboardTableBody">
          </tbody>
        </table>
        <div id="leaderboardEmpty" class="no-data" style="display: none;">No student data available for leaderboard ranking.</div>
      </div>
    </div>
  </div>

  <script src="admin-script.js"></script>
  <script>
    function renderLeaderboards() {
      const entries = AdminDB.getStudentLeaderboard();
      const tbody = document.getElementById('leaderboardTableBody');
      const empty = document.getElementById('leaderboardEmpty');

      if (!entries.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';

      tbody.innerHTML = entries.map(entry => `
        <tr class="${entry.rank <= 3 ? `rank-row rank-${entry.rank}` : ''}">
          <td><span class="rank-badge ${entry.rank <= 3 ? `rank-badge-${entry.rank}` : ''}">#${entry.rank}</span></td>
          <td>${entry.student_id}</td>
          <td>${entry.student_name}</td>
          <td>${entry.course_program}</td>
          <td>${entry.task_completed}</td>
          <td>${entry.total_hours.toFixed(2).replace(/\.00$/, '')}</td>
        </tr>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderLeaderboards();
      setInterval(renderLeaderboards, 30000);
    });
  </script>
</body>
</html>
