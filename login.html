<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCS | Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <script src="supabase-sync.js" defer></script>
  
  <script defer>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('loginForm');
      const messageEl = document.getElementById('login_message');
      
      if (form) {
        form.addEventListener('submit', async function(e) {
          e.preventDefault();
          messageEl.textContent = 'Processing...';
          messageEl.className = 'form-message info';
          
          const idNumber = document.getElementById('login_id').value.trim();
          const password = document.getElementById('login_password').value;
          
          console.log('🔐 Login attempt:', idNumber);
          const result = await LocalDB.login(idNumber, password);
          
          if (result.success) {
            messageEl.textContent = result.message + ' Redirecting...';
            messageEl.className = 'form-message success';
            setTimeout(() => {
              window.location.href = 'student-dashboard.html';
            }, 2000);
          } else {
            messageEl.textContent = result.message;
            messageEl.className = 'form-message error';
            console.log('❌ Login failed:', result.message);
          }
        });
      }
    });
  </script>
</head>
<body>

  <nav>
    <div class="nav-left">
      <img src="images/uclogo.png" alt="UC Logo" class="nav-logo">
      <div class="nav-brand">College of Computer Studies Sit-in Monitoring System</div>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="community.html">Community ▾</a>
      <a href="about.html">About</a>
      <a href="student-reservation.html">Reservation</a>
      <a href="login.html" id="navLogin">Login</a>
      <a href="register.html" id="navRegister">Register</a>
    </div>
  </nav>

  <div class="auth-bg">
    <div class="auth-card">
      <a class="back-btn" href="index.html">Back</a>
      <img src="images/ucmainccslogo.png" alt="UC Logo" class="auth-logo">
      <h2>Login</h2>
      <form action="#" method="post" id="loginForm">
        <div class="form-group">
          <input type="text" name="id_number" id="login_id" required>
          <label>ID Number</label>
        </div>
        <div class="form-group">
          <input type="password" name="password" id="login_password" required>
          <label>Password</label>
        </div>
        <button class="btn-submit" type="submit">Login</button>
      </form>
      <div class="auth-alt">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
      <div id="login_message" class="form-message"></div>
      <div style="text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e9ecef;">
        <a href="admin-login.html" style="color: #0d6efd; text-decoration: none; font-size: 0.85rem;">Admin Login →</a>
      </div>
    </div>
  </div>

</body>
</html>
