<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sit-in Management - CCS Admin</title>
  <link rel="stylesheet" href="admin-styles.css">
  <style>
    .sitin-container {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      margin-top: 20px;
    }
    .sitin-form-panel {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      height: fit-content;
    }
    .sitin-list-panel {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .sitin-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #e9ecef;
    }
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .search-box input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .student-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .student-table thead {
      background: #f8f9fa;
    }
    .student-table th,
    .student-table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #e9ecef;
    }
    .student-table th {
      font-weight: 600;
      color: #333;
    }
    .student-table tbody tr:hover {
      background: #f8f9fa;
    }
    .student-table tbody tr.selected {
      background: #e7f1ff;
    }
    .btn-sitin {
      background: #0d6efd;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-right: 5px;
    }
    .btn-sitin:hover {
      background: #0b5ed7;
    }
    .btn-end {
      background: #dc3545;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-end:hover {
      background: #bb2d3b;
    }
    .btn-sitin:disabled,
    .btn-end:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 5px;
    }
    .status-active-dot {
      background: #198754;
    }
    .status-inactive-dot {
      background: #6c757d;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #555;
      font-size: 0.9rem;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .form-group input[readonly] {
      background: #e9ecef;
    }
    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .no-students {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .active-sessions-count {
      background: #d4edda;
      color: #155724;
      padding: 10px 15px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-weight: 500;
    }
    @media (max-width: 1024px) {
      .sitin-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="admin-nav">
    <div class="nav-left">
      <img src="images/uclogo.png" alt="UC Logo" class="nav-logo">
      <span class="nav-brand">College of Computer Studies Admin</span>
    </div>
    <div class="nav-links">
      <a href="admin.html">Home</a>
      <a href="search-student.html">Search</a>
      <a href="student-list.html">Students</a>
      <a href="sit-in-form.html" class="active">Sit-in</a>
      <a href="sit-in-requests.html">Sit-in Requests</a>
      <a href="sit-in-records.html">Sit-in Records</a>
      <a href="sit-in-reports.html">Sit-in Reports</a>
      <a href="feedback-reports.html">Feedback Reports</a>
      <a href="reservation.html">Reservation</a>
      <a href="announcements.html">Announcements</a>
      <a href="#" onclick="adminLogout(); return false;" class="logout-btn">Log out</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="admin-container">

    <div class="page-header">
      <h1>Sit-in Management</h1>
      <p>Manage student sit-in sessions</p>
    </div>

    <div class="sitin-container">
      <!-- Left Panel: Sit-in Form -->
      <div class="sitin-form-panel">
        <h2 style="margin-bottom: 15px; color: #380402;">📝 Sit-in Form</h2>
        
        <div class="form-group">
          <label for="searchIdNumber">Student ID Number</label>
          <input type="text" id="searchIdNumber" placeholder="Enter student ID number">
          <button class="btn-primary" style="width: 100%; margin-top: 8px;" onclick="findStudent()">Find Student</button>
        </div>

        <div id="studentInfo" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e9ecef;">
          <div class="form-group">
            <label>ID Number</label>
            <input type="text" id="sitinIdNumber" readonly>
          </div>
          <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="sitinStudentName" readonly>
          </div>
          <div class="form-group">
            <label>Purpose</label>
            <input type="text" id="sitinPurpose" placeholder="e.g., C Programming">
          </div>
          <div class="form-group">
            <label>Lab</label>
            <input type="text" id="sitinLab" placeholder="e.g., Lab 524">
          </div>
          <div class="form-group">
            <label>Remaining Session</label>
            <input type="number" id="sitinRemainingSession" placeholder="e.g., 27" min="1">
          </div>
          <div class="form-group">
            <label>Sit-in Date</label>
            <input type="date" id="sitinDate">
          </div>
          <div class="form-group">
            <label>Start Time</label>
            <input type="time" id="sitinStartTime">
          </div>
          <div class="form-actions">
            <button class="btn-submit" style="flex: 1;" onclick="submitSitIn()">Sit In</button>
            <button class="btn-danger" style="flex: 1;" onclick="clearForm()">Clear</button>
          </div>
        </div>
      </div>

      <!-- Right Panel: Student List with Active Sessions -->
      <div class="sitin-list-panel">
        <div class="sitin-list-header">
          <h2 style="color: #380402;">👥 Active Session</h2>
        </div>

        <div class="search-box">
          <input type="text" id="studentListSearch" placeholder="Search by ID number or name..." oninput="filterStudentList()">
        </div>

        <div style="overflow-y: auto; max-height: 600px;">
          <table class="student-table">
            <thead>
              <tr>
                <th>ID Number</th>
                <th>Name</th>
                <th>Course</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentListBody">
              <!-- Data will be loaded here -->
            </tbody>
          </table>
          <div id="noStudents" class="no-students" style="display: none;">No active sessions</div>
        </div>
      </div>
    </div>

  </div>

  <script src="admin-script.js"></script>
  <script>
    let selectedStudent = null;
    let allStudents = [];
    let activeSitIns = [];

    // Initialize page
    document.addEventListener('DOMContentLoaded', function() {
      loadStudents();
      loadActiveSitIns();
      
      // Allow Enter key to search
      const searchInput = document.getElementById('searchIdNumber');
      if (searchInput) {
        searchInput.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            findStudent();
          }
        });
      }
    });

    function loadStudents() {
      try {
        allStudents = AdminDB.getAllUsers();
        renderActiveStudents();
      } catch (e) {
        console.error('Error loading students:', e);
      }
    }

    function loadActiveSitIns() {
      try {
        activeSitIns = AdminDB.getCurrentSitIns();
        renderActiveStudents();
      } catch (e) {
        console.error('Error loading active sit-ins:', e);
      }
    }

    function renderActiveStudents() {
      const tbody = document.getElementById('studentListBody');
      const noStudents = document.getElementById('noStudents');

      if (!tbody) return;

      // Filter to show only students with active sessions
      const activeStudentIds = activeSitIns
        .filter(s => s.status === 'Active')
        .map(s => s.student_id);

      const activeStudents = allStudents.filter(student => 
        activeStudentIds.includes(student.id_number)
      );

      // Update active count
      const activeCountElement = document.getElementById('activeCount');
      if (activeCountElement) {
        activeCountElement.textContent = activeStudents.length;
      }

      if (activeStudents.length === 0) {
        tbody.innerHTML = '';
        noStudents.style.display = 'block';
        return;
      }

      noStudents.style.display = 'none';

      tbody.innerHTML = activeStudents.map(student => {
        const hasActiveSession = true; // Already filtered
        const statusDot = 'status-active-dot';
        const statusText = 'Active';

        return `
          <tr class="${selectedStudent && selectedStudent.id_number === student.id_number ? 'selected' : ''}"
              onclick="selectStudentFromList('${student.id_number}')">
            <td>${student.id_number}</td>
            <td>${student.first_name} ${student.last_name}</td>
            <td>${student.course_program}</td>
            <td><span class="status-indicator ${statusDot}"></span>${statusText}</td>
            <td onclick="event.stopPropagation();">
              <button class="btn-end" onclick="endSession('${student.id_number}')">End Session</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function filterStudentList() {
      const query = document.getElementById('studentListSearch').value.trim().toLowerCase();

      // Get active student IDs
      const activeStudentIds = activeSitIns
        .filter(s => s.status === 'Active')
        .map(s => s.student_id);

      const activeStudents = allStudents.filter(student => 
        activeStudentIds.includes(student.id_number)
      );

      if (!query) {
        renderActiveStudentsFromList(activeStudents);
        return;
      }

      const filtered = activeStudents.filter(student =>
        student.id_number.toLowerCase().includes(query) ||
        `${student.first_name} ${student.last_name}`.toLowerCase().includes(query)
      );

      renderActiveStudentsFromList(filtered);
    }

    function renderActiveStudentsFromList(students) {
      const tbody = document.getElementById('studentListBody');
      const noStudents = document.getElementById('noStudents');

      if (!tbody) return;

      if (students.length === 0) {
        tbody.innerHTML = '';
        noStudents.style.display = 'block';
        return;
      }

      noStudents.style.display = 'none';

      tbody.innerHTML = students.map(student => {
        return `
          <tr class="${selectedStudent && selectedStudent.id_number === student.id_number ? 'selected' : ''}"
              onclick="selectStudentFromList('${student.id_number}')">
            <td>${student.id_number}</td>
            <td>${student.first_name} ${student.last_name}</td>
            <td>${student.course_program}</td>
            <td><span class="status-indicator status-active-dot"></span>Active</td>
            <td onclick="event.stopPropagation();">
              <button class="btn-end" onclick="endSession('${student.id_number}')">End Session</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function selectStudentFromList(idNumber) {
      const student = AdminDB.getUserById(idNumber);
      if (!student) return;

      selectedStudent = student;

      document.getElementById('sitinIdNumber').value = student.id_number;
      document.getElementById('sitinStudentName').value = `${student.first_name} ${student.last_name}`;
      document.getElementById('sitinPurpose').value = '';
      document.getElementById('sitinLab').value = '';
      document.getElementById('sitinRemainingSession').value = student.remaining_session || 30;
      document.getElementById('sitinDate').valueAsDate = new Date();

      const now = new Date();
      const timeString = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      document.getElementById('sitinStartTime').value = timeString;

      document.getElementById('studentInfo').style.display = 'block';
      renderStudentList(allStudents);

      // Scroll to form on mobile
      if (window.innerWidth <= 1024) {
        document.querySelector('.sitin-form-panel').scrollIntoView({ behavior: 'smooth' });
      }
    }

    function findStudent() {
      const idNumber = document.getElementById('searchIdNumber').value.trim();

      if (!idNumber) {
        alert('Please enter a student ID number.');
        return;
      }

      const user = AdminDB.getUserById(idNumber);

      if (!user) {
        alert('Student not found. Please check the ID number or register the student first.');
        document.getElementById('studentInfo').style.display = 'none';
        selectedStudent = null;
        renderStudentList(allStudents);
        return;
      }

      selectStudentFromList(idNumber);
    }

    function submitSitIn() {
      if (!selectedStudent) {
        alert('Please select a student first.');
        return;
      }

      // Check if student already has active session
      const hasActiveSession = activeSitIns.some(s => s.student_id === selectedStudent.id_number && s.status === 'Active');
      if (hasActiveSession) {
        alert('This student already has an active sit-in session. Please end the current session first.');
        return;
      }

      const purpose = document.getElementById('sitinPurpose').value.trim();
      const lab = document.getElementById('sitinLab').value.trim();
      const remainingSession = document.getElementById('sitinRemainingSession').value.trim();
      const sitinDate = document.getElementById('sitinDate').value;
      const startTime = document.getElementById('sitinStartTime').value;

      if (!purpose) {
        alert('Please enter the purpose of the sit-in.');
        return;
      }

      if (!lab) {
        alert('Please enter the lab number.');
        return;
      }

      if (!remainingSession || remainingSession < 1) {
        alert('Please enter a valid remaining session count.');
        return;
      }

      if (!sitinDate) {
        alert('Please select a date.');
        return;
      }

      if (!startTime) {
        alert('Please select a start time.');
        return;
      }

      const sitinData = {
        student_id: selectedStudent.id_number,
        student_name: `${selectedStudent.first_name} ${selectedStudent.last_name}`,
        purpose: purpose,
        lab: lab,
        remaining_session: parseInt(remainingSession),
        sitin_date: sitinDate,
        start_time: startTime,
        status: 'Active',
        sitin_id: 'SIT-' + Date.now()
      };

      const result = AdminDB.addSitIn(sitinData);

      if (result.success) {
        alert('Sit-in recorded successfully!');
        loadActiveSitIns();
        clearForm();
      } else {
        alert('Error recording sit-in: ' + result.message);
      }
    }

    function endSession(studentId) {
      const student = AdminDB.getUserById(studentId);
      if (!student) {
        alert('Student not found!');
        return;
      }

      const activeSession = activeSitIns.find(s => s.student_id === studentId && s.status === 'Active');
      if (!activeSession) {
        alert('No active session found for this student!');
        return;
      }

      const currentSessions = activeSession.remaining_session || 30;
      const newSessions = Math.max(0, currentSessions - 1);

      if (!confirm(`End session for ${student.first_name} ${student.last_name}?\n\nThis will decrease their remaining sessions from ${currentSessions} to ${newSessions}.`)) {
        return;
      }

      // Update sit-in record
      const sitInResult = AdminDB.updateSitIn(activeSession.id, {
        status: 'Completed',
        remaining_session: newSessions,
        completed_at: new Date().toISOString()
      });

      if (!sitInResult.success) {
        alert('Error ending session: ' + sitInResult.message);
        return;
      }

      // Update student record
      const users = AdminDB.getAllUsers();
      const userIndex = users.findIndex(u => u.id_number === studentId);
      if (userIndex !== -1) {
        users[userIndex].remaining_session = newSessions;
        AdminDB.saveAllUsers(users);
      }

      alert(`Session ended successfully!\n${student.first_name} ${student.last_name}'s remaining sessions: ${newSessions}`);
      loadActiveSitIns();
      if (selectedStudent && selectedStudent.id_number === studentId) {
        clearForm();
      }
    }

    function clearForm() {
      document.getElementById('searchIdNumber').value = '';
      document.getElementById('studentInfo').style.display = 'none';
      selectedStudent = null;
      renderActiveStudents();
    }
  </script>
</body>
</html>
