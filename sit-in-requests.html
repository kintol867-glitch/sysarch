<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sit-in Requests - CCS Admin</title>
  <link rel="stylesheet" href="admin-styles.css">
  <style>
    .request-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      margin-bottom: 15px;
      border-left: 4px solid #ffc107;
    }
    .request-card.active {
      border-left-color: #198754;
    }
    .request-card.rejected {
      border-left-color: #dc3545;
    }
    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e9ecef;
    }
    .request-student {
      font-size: 1.1rem;
      font-weight: 600;
      color: #380402;
    }
    .request-status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .status-pending {
      background: #fff3cd;
      color: #856404;
    }
    .status-active {
      background: #d4edda;
      color: #155724;
    }
    .status-rejected {
      background: #f8d7da;
      color: #721c24;
    }
    .request-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 15px;
    }
    .detail-item {
      font-size: 0.9rem;
    }
    .detail-item label {
      color: #666;
      font-size: 0.8rem;
      display: block;
      margin-bottom: 3px;
    }
    .detail-item span {
      color: #333;
      font-weight: 500;
    }
    .request-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn-approve {
      background: #198754;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-approve:hover {
      background: #146c43;
    }
    .btn-reject {
      background: #dc3545;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-reject:hover {
      background: #b02a37;
    }
    .no-requests {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .filter-section {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-section label {
      font-weight: 500;
      color: #555;
    }
    .filter-section select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="admin-nav">
    <div class="nav-left">
      <img src="images/uclogo.png" alt="UC Logo" class="nav-logo">
      <span class="nav-brand">College of Computer Studies Admin</span>
    </div>
    <div class="nav-links">
      <a href="admin.html">Home</a>
      <a href="search-student.html">Search</a>
      <a href="student-list.html">Students</a>
      <a href="sit-in-form.html">Sit-in</a>
      <a href="sit-in-requests.html" class="active">Sit-in Requests</a>
      <a href="sit-in-records.html">Sit-in Records</a>
      <a href="sit-in-reports.html">Sit-in Reports</a>
      <a href="feedback-reports.html">Feedback Reports</a>
      <a href="reservation.html">Reservation</a>
      <a href="announcements.html">Announcements</a>
      <a href="#" onclick="adminLogout(); return false;" class="logout-btn">Log out</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="admin-container">

    <div class="page-header">
      <h1>Sit-in Requests</h1>
      <p>Approve or reject student sit-in requests</p>
    </div>

    <!-- Filter Section -->
    <div class="filter-section">
      <label for="filterStatus">Filter by Status:</label>
      <select id="filterStatus" onchange="loadRequests()">
        <option value="all">All</option>
        <option value="Pending" selected>Pending</option>
        <option value="Active">Active</option>
        <option value="Rejected">Rejected</option>
      </select>
      <label for="filterCourse">Course:</label>
      <select id="filterCourse" onchange="loadRequests()">
        <option value="all">All</option>
        <option value="BSIT">BSIT</option>
        <option value="BSCS">BSCS</option>
        <option value="ACT">ACT</option>
      </select>
    </div>

    <!-- Requests List -->
    <div id="requestsList">
      <!-- Request cards will be loaded here -->
    </div>

  </div>

  <script src="admin-script.js"></script>
  <script>
    let allRequests = [];
    let filteredRequests = [];

    function loadRequests() {
      allRequests = AdminDB.getAllSitIns();
      filteredRequests = [...allRequests];

      const statusFilter = document.getElementById('filterStatus').value;
      const courseFilter = document.getElementById('filterCourse').value;

      // Filter by status
      if (statusFilter !== 'all') {
        filteredRequests = filteredRequests.filter(r => r.status === statusFilter);
      }

      // Filter by course (need to get user info)
      if (courseFilter !== 'all') {
        const users = AdminDB.getAllUsers();
        filteredRequests = filteredRequests.filter(r => {
          const user = users.find(u => u.id_number === r.student_id);
          return user && user.course_program === courseFilter;
        });
      }

      // Sort by created_at (newest first)
      filteredRequests.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      renderRequests();
    }

    function renderRequests() {
      const container = document.getElementById('requestsList');
      if (!container) return;

      if (filteredRequests.length === 0) {
        container.innerHTML = '<div class="no-requests">No sit-in requests found</div>';
        return;
      }

      const users = AdminDB.getAllUsers();

      container.innerHTML = filteredRequests.map(req => {
        const user = users.find(u => u.id_number === req.student_id);
        const date = formatDate(req.sitin_date || req.created_at);
        const statusClass = req.status === 'Pending' ? 'status-pending' : 
                           req.status === 'Active' ? 'status-active' : 'status-rejected';
        const cardClass = req.status === 'Pending' ? '' : req.status.toLowerCase();

        return `
          <div class="request-card ${cardClass}">
            <div class="request-header">
              <div>
                <div class="request-student">${req.student_name}</div>
                <div style="font-size: 0.85rem; color: #666;">${req.student_id} | ${user ? user.course_program : 'N/A'}</div>
              </div>
              <span class="request-status ${statusClass}">${req.status}</span>
            </div>
            <div class="request-details">
              <div class="detail-item">
                <label>Purpose</label>
                <span>${req.purpose}</span>
              </div>
              <div class="detail-item">
                <label>Lab</label>
                <span>${req.lab}</span>
              </div>
              <div class="detail-item">
                <label>Date</label>
                <span>${date}</span>
              </div>
              <div class="detail-item">
                <label>Time</label>
                <span>${req.start_time || 'N/A'}</span>
              </div>
              <div class="detail-item">
                <label>Remaining Sessions</label>
                <span>${req.remaining_session || 30}</span>
              </div>
              <div class="detail-item">
                <label>Requested</label>
                <span>${new Date(req.created_at).toLocaleString()}</span>
              </div>
            </div>
            ${req.status === 'Pending' ? `
            <div class="request-actions">
              <button class="btn-approve" onclick="approveRequest('${req.id}')">✓ Approve</button>
              <button class="btn-reject" onclick="rejectRequest('${req.id}')">✗ Reject</button>
            </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function approveRequest(id) {
      if (!confirm('Approve this sit-in request? The student will be able to start their session.')) {
        return;
      }

      const result = AdminDB.approveSitIn(id);

      if (result.success) {
        alert('Sit-in request approved!');
        loadRequests();
      } else {
        alert('Error: ' + result.message);
      }
    }

    function rejectRequest(id) {
      const reason = prompt('Enter reason for rejection (optional):');
      if (reason === null) return;

      const result = AdminDB.rejectSitIn(id);

      if (result.success) {
        alert('Sit-in request rejected.');
        loadRequests();
      } else {
        alert('Error: ' + result.message);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadRequests();
    });
  </script>
</body>
</html>
