<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students Information - CCS Admin</title>
  <link rel="stylesheet" href="admin-styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="admin-nav">
    <div class="nav-left">
      <img src="images/uclogo.png" alt="UC Logo" class="nav-logo">
      <span class="nav-brand">College of Computer Studies Admin</span>
    </div>
    <div class="nav-links">
      <a href="admin.html">Home</a>
      <a href="search-student.html">Search</a>
      <a href="student-list.html" class="active">Students</a>
      <a href="sit-in-form.html">Sit-in</a>
      <a href="sit-in-requests.html">Sit-in Requests</a>
      <a href="sit-in-records.html">Sit-in Records</a>
      <a href="sit-in-reports.html">Sit-in Reports</a>
      <a href="feedback-reports.html">Feedback Reports</a>
      <a href="reservation.html">Reservation</a>
      <a href="announcements.html">Announcements</a>
      <a href="#" onclick="adminLogout(); return false;" class="logout-btn">Log out</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="admin-container">
    
    <div class="page-header">
      <h1>Students Information</h1>
    </div>

    <div class="table-container">
      <div class="table-header">
        <div class="table-controls">
          <button class="btn-primary" onclick="openAddStudentModal()">Add Students</button>
          <button class="btn-danger" onclick="resetAllSession()">Reset All Session</button>
        </div>
        <div class="table-controls">
          <input type="text" id="tableSearch" class="table-search" placeholder="Search...">
        </div>
      </div>

      <div class="entries-control" style="margin-bottom: 15px;">
        <label for="entriesPerPage">Show</label>
        <select id="entriesPerPage" onchange="changeEntriesPerPage()">
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <span>entries per page</span>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>ID Number</th>
            <th>Name</th>
            <th>Year Level</th>
            <th>Course</th>
            <th>Remaining Session</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTableBody">
          <!-- Data will be loaded here -->
        </tbody>
      </table>

      <div class="pagination" id="pagination">
        <!-- Pagination will be generated here -->
      </div>

    </div>

  </div>

  <!-- Add Student Modal -->
  <div class="modal" id="addStudentModal">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h3>Add New Student</h3>
        <button class="modal-close" onclick="closeModal('addStudentModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>ID Number *</label>
          <input type="text" id="newStudentId" placeholder="Enter ID number">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>First Name *</label>
            <input type="text" id="newStudentFirst" placeholder="First name">
          </div>
          <div class="form-group">
            <label>Last Name *</label>
            <input type="text" id="newStudentLast" placeholder="Last name">
          </div>
        </div>
        <div class="form-group">
          <label>Middle Name</label>
          <input type="text" id="newStudentMiddle" placeholder="Middle name">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="newStudentEmail" placeholder="Email address">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Course Program *</label>
            <select id="newStudentCourse">
              <option value="">Select Course</option>
              <option value="BSIT">BSIT</option>
              <option value="BSCS">BSCS</option>
              <option value="ACT">ACT</option>
            </select>
          </div>
          <div class="form-group">
            <label>Year Level *</label>
            <select id="newStudentLevel">
              <option value="">Select Level</option>
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="newStudentPassword" placeholder="Password">
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="newStudentAddress" placeholder="Address">
        </div>
        <button class="btn-submit" style="width: 100%; margin-top: 10px;" onclick="addStudent()">Add Student</button>
      </div>
    </div>
  </div>

  <!-- Edit Student Modal -->
  <div class="modal" id="editStudentModal">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h3>Edit Student</h3>
        <button class="modal-close" onclick="closeModal('editStudentModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>ID Number</label>
          <input type="text" id="editStudentId" readonly>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>First Name *</label>
            <input type="text" id="editStudentFirst">
          </div>
          <div class="form-group">
            <label>Last Name *</label>
            <input type="text" id="editStudentLast">
          </div>
        </div>
        <div class="form-group">
          <label>Middle Name</label>
          <input type="text" id="editStudentMiddle">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="editStudentEmail">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Course Program *</label>
            <select id="editStudentCourse">
              <option value="BSIT">BSIT</option>
              <option value="BSCS">BSCS</option>
              <option value="ACT">ACT</option>
            </select>
          </div>
          <div class="form-group">
            <label>Year Level *</label>
            <select id="editStudentLevel">
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="editStudentAddress">
        </div>
        <button class="btn-submit" style="width: 100%; margin-top: 10px;" onclick="saveEditStudent()">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="admin-script.js"></script>
  <script>
    // Pagination state
    let currentPage = 1;
    let entriesPerPage = 10;
    let allStudents = [];
    let filteredStudents = [];

    function loadStudents() {
      allStudents = AdminDB.getAllUsers();
      filteredStudents = [...allStudents];
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('studentsTableBody');
      if (!tbody) return;

      if (filteredStudents.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="no-data">No students found</td></tr>';
        renderPagination(0);
        return;
      }

      const startIndex = (currentPage - 1) * entriesPerPage;
      const endIndex = startIndex + entriesPerPage;
      const pageData = filteredStudents.slice(startIndex, endIndex);

      tbody.innerHTML = pageData.map(student => `
        <tr>
          <td>${student.id_number}</td>
          <td>${student.first_name} ${student.last_name}</td>
          <td>${getLevelText(student.course_level)}</td>
          <td>${student.course_program}</td>
          <td>${student.remaining_session || 30}</td>
          <td>
            <button class="btn-edit" onclick="editStudent('${student.id_number}')">Edit</button>
            <button class="btn-delete" onclick="deleteStudent('${student.id_number}')">Delete</button>
          </td>
        </tr>
      `).join('');

      renderPagination(filteredStudents.length);
    }

    function renderPagination(totalItems) {
      const pagination = document.getElementById('pagination');
      if (!pagination) return;

      const totalPages = Math.ceil(totalItems / entriesPerPage);
      
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';
      
      // Previous button
      html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">«</button>`;
      
      // Page numbers
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
      }
      
      // Next button
      html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">»</button>`;
      
      pagination.innerHTML = html;
    }

    function changePage(page) {
      const totalPages = Math.ceil(filteredStudents.length / entriesPerPage);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    }

    function changeEntriesPerPage() {
      const select = document.getElementById('entriesPerPage');
      entriesPerPage = parseInt(select.value);
      currentPage = 1;
      renderTable();
    }

    // Search functionality
    document.getElementById('tableSearch').addEventListener('input', function(e) {
      const query = e.target.value.trim().toLowerCase();
      
      if (!query) {
        filteredStudents = [...allStudents];
      } else {
        filteredStudents = allStudents.filter(student => 
          student.id_number.toLowerCase().includes(query) ||
          (student.first_name + ' ' + student.last_name).toLowerCase().includes(query) ||
          student.email.toLowerCase().includes(query) ||
          student.course_program.toLowerCase().includes(query)
        );
      }
      
      currentPage = 1;
      renderTable();
    });

    // Add student
    function openAddStudentModal() {
      openModal('addStudentModal');
    }

    function addStudent() {
      const idNumber = document.getElementById('newStudentId').value.trim();
      const firstName = document.getElementById('newStudentFirst').value.trim();
      const lastName = document.getElementById('newStudentLast').value.trim();
      const middleName = document.getElementById('newStudentMiddle').value.trim();
      const email = document.getElementById('newStudentEmail').value.trim();
      const courseProgram = document.getElementById('newStudentCourse').value;
      const courseLevel = document.getElementById('newStudentLevel').value;
      const password = document.getElementById('newStudentPassword').value;
      const address = document.getElementById('newStudentAddress').value.trim();

      if (!idNumber || !firstName || !lastName || !email || !courseProgram || !courseLevel || !password) {
        alert('Please fill in all required fields.');
        return;
      }

      const userData = {
        id_number: idNumber,
        first_name: firstName,
        last_name: lastName,
        middle_name: middleName,
        email: email,
        course_program: courseProgram,
        course_level: courseLevel,
        password: password,
        address: address,
        remaining_session: 30,
        created_at: new Date().toISOString()
      };

      const result = AdminDB.addUser(userData);
      
      if (result.success) {
        alert('Student added successfully!');
        closeModal('addStudentModal');
        clearAddForm();
        loadStudents();
      } else {
        alert('Error: ' + result.message);
      }
    }

    function clearAddForm() {
      document.getElementById('newStudentId').value = '';
      document.getElementById('newStudentFirst').value = '';
      document.getElementById('newStudentLast').value = '';
      document.getElementById('newStudentMiddle').value = '';
      document.getElementById('newStudentEmail').value = '';
      document.getElementById('newStudentCourse').value = '';
      document.getElementById('newStudentLevel').value = '';
      document.getElementById('newStudentPassword').value = '';
      document.getElementById('newStudentAddress').value = '';
    }

    // Edit student
    function editStudent(idNumber) {
      const student = AdminDB.getUserById(idNumber);
      if (!student) return;

      document.getElementById('editStudentId').value = student.id_number;
      document.getElementById('editStudentFirst').value = student.first_name;
      document.getElementById('editStudentLast').value = student.last_name;
      document.getElementById('editStudentMiddle').value = student.middle_name || '';
      document.getElementById('editStudentEmail').value = student.email;
      document.getElementById('editStudentCourse').value = student.course_program;
      document.getElementById('editStudentLevel').value = student.course_level;
      document.getElementById('editStudentAddress').value = student.address || '';

      openModal('editStudentModal');
    }

    function saveEditStudent() {
      const idNumber = document.getElementById('editStudentId').value;
      
      const updatedData = {
        first_name: document.getElementById('editStudentFirst').value.trim(),
        last_name: document.getElementById('editStudentLast').value.trim(),
        middle_name: document.getElementById('editStudentMiddle').value.trim(),
        email: document.getElementById('editStudentEmail').value.trim(),
        course_program: document.getElementById('editStudentCourse').value,
        course_level: document.getElementById('editStudentLevel').value,
        address: document.getElementById('editStudentAddress').value.trim()
      };

      const result = AdminDB.updateUser(idNumber, updatedData);
      
      if (result.success) {
        alert('Student updated successfully!');
        closeModal('editStudentModal');
        loadStudents();
      } else {
        alert('Error: ' + result.message);
      }
    }

    // Delete student
    function deleteStudent(idNumber) {
      if (!confirm('Are you sure you want to delete this student? This action cannot be undone.')) {
        return;
      }

      const result = AdminDB.deleteUser(idNumber);
      
      if (result.success) {
        alert('Student deleted successfully!');
        loadStudents();
      } else {
        alert('Error: ' + result.message);
      }
    }

    // Reset all sessions
    function resetAllSession() {
      if (!confirm('Are you sure you want to reset all students\' remaining sessions to 30?')) {
        return;
      }

      const users = AdminDB.getAllUsers();
      users.forEach(user => {
        user.remaining_session = 30;
      });

      localStorage.setItem(AdminDB.USERS_KEY, JSON.stringify(users));
      alert('All sessions have been reset to 30.');
      loadStudents();
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      loadStudents();
    });
  </script>
</body>
</html>
